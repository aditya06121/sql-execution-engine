name: Build and Deploy

on:
    push:
        branches:
            - main

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build and push Docker image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: true
                  tags: gisul/sql-execution-engine:latest

    deploy:
        needs: build
        runs-on: self-hosted

        steps:
            - name: Deploy container
              shell: bash
              run: |
                  docker pull gisul/sql-execution-engine:latest

                  container=$(docker ps -a --filter "name=sql-execution-engine" --format "{{.Names}}")

                  if [ -n "$container" ]; then
                    docker stop sql-execution-engine
                    docker rm sql-execution-engine
                  fi

                  docker run -d -p 6060:6060 \
                    --name sql-execution-engine \
                    --restart unless-stopped \
                    gisul/sql-execution-engine:latest
