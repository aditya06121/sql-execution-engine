name: Build and Deploy

on:
    push:
        branches:
            - main

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build and push Docker image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: true
                  tags: gisul/sql-execution-engine:latest

    deploy:
        needs: build
        runs-on: self-hosted

        steps:
            - name: Deploy container in WSL
              shell: powershell
              env:
                  IMAGE_NAME: gisul/sql-execution-engine:latest
                  CONTAINER_NAME: sql-execution-engine
                  HOST_PORT: "6060"
                  CONTAINER_PORT: "6060"
                  # Optional: define this as a repo/org variable to pin distro (e.g. "Ubuntu")
                  WSL_DISTRO: ${{ vars.WSL_DISTRO_NAME }}
              run: |
                  $ErrorActionPreference = "Stop"

                  $distro = "${env:WSL_DISTRO}"
                  if (-not $distro) {
                      $distro = (wsl -l -q | Where-Object { $_ -and $_ -notmatch "docker-desktop" } | Select-Object -First 1).Trim()
                  }

                  if (-not $distro) {
                      throw "No WSL distro found. Set repository variable WSL_DISTRO_NAME (for example: Ubuntu)."
                  }

                  Write-Host "Deploying in WSL distro: $distro"

                  wsl -d $distro -- bash -lc 'set -euo pipefail; if ! command -v docker >/dev/null 2>&1; then echo "docker command not found in WSL distro" >&2; exit 1; fi; docker pull "$IMAGE_NAME"; existing=$(docker ps -aq -f "name=^$CONTAINER_NAME$"); if [ -n "$existing" ]; then docker stop "$CONTAINER_NAME" || true; docker rm "$CONTAINER_NAME"; fi; docker run -d --name "$CONTAINER_NAME" --restart unless-stopped -p "$HOST_PORT:$CONTAINER_PORT" "$IMAGE_NAME"'
